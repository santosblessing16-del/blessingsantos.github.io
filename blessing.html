<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Icon</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        body {

            background: url("https://animesher.com/orig/1/141/1414/14140/animesher.com_black-night-gif-1414076.gif ") no-repeat center center fixed;
            background-size: cover;
            
        }

        .icon-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 60px; /* space between BLESSING and SANTOS */
        }

        .word-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
        }

        i {
            font-size: 4rem;
        }
    </style>
</head>

<body>

<div class="icon-container">

    <!-- BLESSING -->
    <div class="word-group">
        <i class="fa-solid fa-bold fa-bounce" style="color: rgb(116, 192, 252);"></i>
        <i class="fa-solid fa-litecoin-sign fa-bounce" style="color: rgb(116, 192, 252);"></i>
        <i class="fa-brands fa-edge-legacy fa-bounce" style="color: rgb(116, 192, 252);"></i>
        <i class="fa-brands fa-scribd fa-bounce" style="color: rgb(116, 192, 252);"></i>
        <i class="fa-brands fa-scribd fa-bounce" style="color: rgb(116, 192, 252);"></i>
        <i class="fa-solid fa-italic fa-bounce" style="color: rgb(116, 192, 252);"></i>
        <i class="fa-brands fa-neos fa-bounce" style="color: rgb(116, 192, 252);"></i>
        <i class="fa-brands fa-google fa-bounce" style="color: rgb(116, 192, 252);"></i>
    </div>

    <!-- SANTOS -->
    <div class="word-group">
        <i class="fa-brands fa-scribd fa-fade" style="color: rgb(255, 212, 59);"></i>
        <i class="fa-brands fa-amilia fa-fade" style="color: rgb(255, 212, 59);"></i>
        <i class="fa-brands fa-neos fa-fade" style="color: rgb(255, 212, 59);"></i>
        <i class="fa-solid fa-tenge-sign fa-fade" style="color: rgb(255, 212, 59);"></i>
        <i class="fa-brands fa-opera fa-fade" style="color: rgb(255, 212, 59);"></i>
        <i class="fa-brands fa-scribd fa-fade" style="color: rgb(255, 212, 59);"></i>
    </div>

</div>

</body>
</html>
